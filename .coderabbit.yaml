# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: "ko-KR"
early_access: false

# ─────────────────────────────────────────
# 리뷰어 페르소나 설정
# ─────────────────────────────────────────
tone_instructions: |
  당신은 Next.js App Router, React 19, TypeScript 전문 시니어 프론트엔드 개발자입니다.
  간결하고 실용적인 피드백만 제공하며, 명백한 문제가 아닌 경우 지적을 자제합니다.
  코드 품질, 타입 안전성, 성능에 집중합니다.

reviews:
  profile: "chill"
  request_changes_workflow: true
  high_level_summary: true
  poem: false               # 시 비활성화 - 실무에서 불필요
  review_status: true
  collapse_walkthrough: false
  sequence_diagrams: false  # 필요 시 @coderabbitai generate sequence diagram 으로 수동 요청

  auto_review:
    enabled: true
    drafts: false
    incremental_reviews: true
    ignore_title_keywords:
      - "WIP"
      - "wip"
      - "DO NOT MERGE"
      - "[skip review]"

  # ─────────────────────────────────────────
  # 전체 공통 지시사항
  # ─────────────────────────────────────────
  instructions: |
    이 프로젝트는 Next.js 16 App Router + React 19 + TypeScript 5 + Tailwind CSS v4 스택입니다.
    pnpm을 패키지 매니저로 사용합니다.

    다음 항목은 무시해:
    - 포매팅, 들여쓰기 (Prettier/ESLint가 담당)
    - import 순서 (ESLint가 담당)
    - console.log 단순 경고 (ESLint가 담당)

    다음 항목에 집중해:
    - 런타임 에러 가능성 (null/undefined 참조, 타입 단언 남용)
    - Next.js App Router 패턴 위반 (Server/Client Component 혼용 오류)
    - 'use client' 지시어 불필요한 남용
    - next-auth 세션 처리 누락 또는 보안 취약점
    - 환경변수 하드코딩 (NEXT_PUBLIC_ 등)
    - 비동기 에러 핸들링 누락

  # ─────────────────────────────────────────
  # 파일별 세부 리뷰 기준
  # ─────────────────────────────────────────
  path_instructions:

    # Next.js App Router - 레이아웃/페이지
    - path: "src/app/**/layout.tsx"
      instructions: |
        - metadata 객체 누락 여부 확인
        - 불필요한 'use client' 사용 지적 (layout은 기본 Server Component)
        - children prop 타입 명시 여부 확인

    - path: "src/app/**/page.tsx"
      instructions: |
        - Server Component에서 fetch 사용 시 캐싱 옵션(revalidate, no-store) 명시 여부
        - 불필요한 'use client' 사용 지적
        - loading.tsx, error.tsx 파일 분리 권장 여부

    # React 컴포넌트
    - path: "src/components/**/*.tsx"
      instructions: |
        - useEffect 의존성 배열 누락 또는 잘못된 의존성 지적
        - inline 객체/함수 생성으로 인한 불필요한 리렌더링 패턴
        - 리스트 렌더링 시 key prop 누락
        - aria-label, role 등 기본 접근성 속성 누락
        - Tailwind 클래스 과도한 중복 시 컴포넌트 분리 또는 cn() 유틸 활용 제안
        - Ant Design Icon 사용 시 필요한 아이콘만 named import 하는지 확인

    # 커스텀 훅
    - path: "src/hooks/**/*.ts"
      instructions: |
        - 훅 네이밍 컨벤션 확인 (use 접두사 필수)
        - useEffect cleanup 함수 누락 여부 (메모리 누수 가능성)
        - 의존성 배열 정확성 검토

    # 인증 관련
    - path: "src/**/*auth*,src/**/*Auth*,src/app/api/auth/**"
      instructions: |
        next-auth v4 기준으로 검토:
        - getServerSession 사용 시 authOptions 전달 여부
        - 클라이언트에서 useSession 사용 시 status 체크 여부
        - 민감한 정보(secret, credentials)가 코드에 하드코딩되지 않았는지
        - NEXTAUTH_SECRET, NEXTAUTH_URL 환경변수 의존 여부

    # API Route
    - path: "src/app/api/**"
      instructions: |
        - try/catch 없는 async 핸들러 지적
        - 적절한 HTTP 상태코드 반환 여부 (200/400/401/500)
        - 입력값 검증 누락 여부
        - 인증되지 않은 접근에 대한 401 처리

    # Recharts 차트 컴포넌트
    - path: "src/**/*Chart*,src/**/*chart*,src/**/*Graph*"
      instructions: |
        - ResponsiveContainer로 감싸져 있는지 확인
        - 데이터가 빈 배열일 때 빈 화면 처리 여부
        - 'use client' 지시어 필수 여부 확인 (Recharts는 Client Component)

    # TypeScript 타입 파일
    - path: "src/types/**/*.ts,src/**/*.d.ts"
      instructions: |
        - any 타입 사용 금지, unknown 활용 권장
        - interface vs type 일관성 확인
        - export 누락 여부

    # 테스트 파일
    - path: "**/*.test.ts,**/*.test.tsx"
      instructions: |
        - describe/it 블록 네이밍이 명확한지 확인
        - 단순 구현 반복이 아닌 동작/시나리오 중심 테스트인지 확인
        - 비동기 테스트에서 await/waitFor 누락 여부
        - 포매팅, 스타일 지적은 하지 말 것

    # 설정 파일들 - 리뷰 제외
    - path: "*.config.ts,*.config.mjs,*.config.js"
      instructions: |
        설정 파일이므로 보안상 민감한 값(API 키, 시크릿) 하드코딩 여부만 확인.
        그 외 스타일/구조 지적은 하지 말 것.

  # ─────────────────────────────────────────
  # 리뷰 제외 파일
  # ─────────────────────────────────────────
  path_filters:
    - "!.next/**"
    - "!node_modules/**"
    - "!dist/**"
    - "!build/**"
    - "!public/**"
    - "!pnpm-lock.yaml"
    - "!package-lock.json"
    - "!**/__snapshots__/**"
    - "!codereview/**"       # 코드리뷰 가이드 문서 폴더 제외
    - "!.claude/**"          # Claude 설정 폴더 제외

chat:
  auto_reply: true
